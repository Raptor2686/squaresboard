services:
  - type: web
    name: squaresboard-api
    runtime: python
    pythonVersion: "3.12"
    rootDir: backend
    buildCommand: pip install -r requirements.txt && pip install "pydantic>=2.0" --force-reinstall
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////var/data/squaresboard.db
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SECRET_KEY
        generateValue: true
