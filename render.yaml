services:
  - type: web
    name: squaresboard-api
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install --force-reinstall "pydantic>=2.0" --no-deps && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: THESPORTSDB_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
